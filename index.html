<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesis Magma — 주행 시뮬레이션</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1d23; }
    #app { width: 100vw; height: 100vh; display: block; }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e6e8eb;
      background: #1a1d23;
      transition: opacity 0.4s ease;
      z-index: 10;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader .bar-wrap {
      width: 240px;
      height: 4px;
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #loader .bar {
      height: 100%;
      width: 0%;
      background: #ff6a3d;
      transition: width 0.2s ease;
    }
    #loader .pct { margin-top: 8px; font-size: 12px; color: #9aa0a6; }

    /* 축하 배너 */
    #celebrate {
      position: fixed;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    #celebrate .flag { font-size: 28px; line-height: 1; }
    #celebrate .title {
      margin-top: 5px;
      font-size: clamp(15px, 2.4vw, 28px);
      font-weight: 800;
      letter-spacing: 0.16em;
      background: linear-gradient(180deg, #ffe7a3 0%, #ffb340 45%, #ff6a3d 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 20px rgba(255, 140, 60, 0.35);
    }
    #celebrate .car {
      margin-top: 4px;
      font-size: clamp(22px, 4.0vw, 48px);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #f5f7fa;
      text-shadow: 0 3px 26px rgba(0, 0, 0, 0.55);
    }
    #celebrate .sub {
      margin-top: 10px;
      font-size: clamp(11px, 1.5vw, 16px);
      letter-spacing: 0.34em;
      color: #cdd3da;
      text-transform: uppercase;
    }
    #celebrate .sub b { color: #ff6a3d; }
    #celebrate .rule {
      width: 60%;
      max-width: 420px;
      height: 1px;
      margin: 12px auto 0;
      background: linear-gradient(90deg, transparent, #ff8a4d, transparent);
    }
    #celebrate .glow { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes rise {
      from { opacity: 0; transform: translate(-50%, -16px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(255, 140, 60, 0)); }
      50%      { filter: drop-shadow(0 0 14px rgba(255, 140, 60, 0.55)); }
    }

    /* 하단 크레딧 */
    #credit {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.14em;
      color: #cdd3da;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }
    #credit b { color: #ff6a3d; font-weight: 700; }

    /* 미니맵 프레임(실제 장면은 WebGL 뷰포트가 이 영역에 그림) */
    #minimap {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 200px;
      height: 200px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      user-select: none;
      z-index: 5;
      overflow: hidden;
    }
    #minimap .label {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #cdd3da;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="celebrate">
    <div class="flag glow">🏁</div>
    <div class="title">CONGRATULATIONS!</div>
    <div class="car">GENESIS MAGMA</div>
    <div class="rule"></div>
    <div class="sub">24 Heures du Mans · 24h <b>FINISHER</b></div>
  </div>

  <div id="credit"><b>동명대학교 게임그래픽학과</b> · Y.M. Kang</div>

  <div id="minimap">
    <div class="label">조종석 시점 · COCKPIT</div>
  </div>

  <div id="loader">
    <div>GenesisMagma.glb 불러오는 중…</div>
    <div class="bar-wrap"><div class="bar" id="loader-bar"></div></div>
    <div class="pct" id="loader-pct">0%</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
